# TPC-H scale factor 100 configuration.
# Per-scale-factor shuffle parallelism and Spark/Hudi tuning parameters.

shuffle_parallelism:
  customer: 3
  lineitem: 73
  nation: 1
  orders: 17
  part: 3
  partsupp: 12
  region: 1
  supplier: 1

# Spark configs for 'create-tables' command
create_tables:
  spark_conf:
    spark.driver.memory: 120g

# Benchmark settings
bench:
  warmup: 2
  iterations: 3
  spark_conf:
    spark.driver.memory: 120g
    spark.driver.memoryOverhead: 30g
    spark.sql.shuffle.partitions: "64"
    spark.sql.autoBroadcastJoinThreshold: "67108864"
  datafusion_conf:
    memory_limit: 120g
    datafusion.execution.target_partitions: "64"
    datafusion.execution.batch_size: "65536"
    datafusion.optimizer.hash_join_single_partition_threshold: "67108864"
