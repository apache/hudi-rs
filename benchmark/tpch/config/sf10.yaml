# TPC-H scale factor 10 configuration.
# Per-scale-factor shuffle parallelism and Spark/Hudi tuning parameters.

shuffle_parallelism:
  customer: 1
  lineitem: 8
  nation: 1
  orders: 2
  part: 1
  partsupp: 2
  region: 1
  supplier: 1

# Spark configs for 'create-tables' command
create_tables:
  spark_conf:
    spark.driver.memory: 12g

# Benchmark settings
bench:
  warmup: 1
  iterations: 3
  spark_conf:
    spark.driver.memory: 12g
    spark.driver.memoryOverhead: 3g
    spark.sql.shuffle.partitions: "16"
    spark.sql.autoBroadcastJoinThreshold: "33554432"
  datafusion_conf:
    memory_limit: 12g
    target_partitions: 16
    hash_join_single_partition_threshold: 33554432
