# TPC-H scale factor 1000 configuration.
# Per-scale-factor shuffle parallelism and Spark/Hudi tuning parameters.

shuffle_parallelism:
  customer: 12
  lineitem: 292
  nation: 1
  orders: 68
  part: 12
  partsupp: 48
  region: 1
  supplier: 4

# Spark configs for 'create-tables' command
create_tables:
  spark_conf:
    spark.driver.memory: 256g

# Benchmark settings (shared across DataFusion and Spark)
bench:
  warmup: 2
  iterations: 3
  spark_conf:
    spark.driver.memory: 256g
    spark.driver.memoryOverhead: 64g
    spark.sql.shuffle.partitions: "256"
    spark.sql.autoBroadcastJoinThreshold: "134217728"
  datafusion_conf:
    memory_limit: 256g
    target_partitions: 256
    hash_join_single_partition_threshold: 134217728
